  #   cost_usd: 0.0
  #   wall_time_hours: 18.5

# ─── Совместимость ───────────────────────────────────────────
compatibility:
  os: ["linux"]
  arch: ["x86_64"]
  requires_local_model_server: true
  local_model_server_spec:
    backend: "llama-server"
    model: "gemma-4-26b"
    min_vram_gb: 5
    min_ram_gb: 16
    min_context_tokens: 32000
  notes: |
    GPU gtx1080 8GB подходит (5GB VRAM под модель, 3GB под контекст).
    Без GPU — медленнее в 4-5x, но работает.

