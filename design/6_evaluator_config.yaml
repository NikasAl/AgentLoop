## Пример 4: Видео-подкаст (long-running pipeline)

```yaml
evaluator_config_id: video_podcast_v1
task_type: "media_generation"
domain: "content_creation"

metrics:
  - name: "script_quality"
    description: "Качество сценария диалога"
    evaluator: "llm_judge"
    judge_model: "human:browser"
    judge_prompt_ref: "script_judge_v1"
    direction: "max"
    weight: 0.35
    scale: "0..1"
    evaluated_at: "post-script_gate"
    notes: "оценивается ДО запуска TTS, чтобы не тратить ресурсы зря"
  
  - name: "audio_quality"
    description: "Качество аудио (нет заиканий, ровный темп)"
    evaluator: "python:audio_quality_analyzer"
    direction: "max"
    weight: 0.20
    scale: "0..1"
    automated: true
    dependencies: ["python:pydub", "python:librosa"]
  
  - name: "information_density"
    description: "Плотность информации (не вода)"
    evaluator: "llm_judge"
    judge_model: "openrouter:gemini-3.1-flash"
    judge_prompt_ref: "info_density_judge_v1"
    direction: "max"
    weight: 0.20
    scale: "0..1"
  
  - name: "factual_accuracy"
    description: "Фактологическая точность"
    evaluator: "llm_judge"
    judge_model: "openrouter:deepseek-v3"
    judge_prompt_ref: "factual_check_judge_v1"
    direction: "max"
    weight: 0.25
    scale: "0..1"

composite_score:
  method: "weighted_sum"
  minimum_thresholds:
    script_quality: 0.7  # ниже — пересоздавать скрипт
    factual_accuracy: 0.8  # ниже — фактическая ошибка, нельзя публиковать

penalties:
  - condition: "wall_time_hours > 2"
    multiplier: 0.90
  - condition: "total_cost_usd > 0.50"
    multiplier: 0.85
  - condition: "script_rejections > 2"
    multiplier: 0.80

stage_gates:
  - after: "write_dialogue_script"
    metric: "script_quality"
    must_pass: 0.7
    on_fail: "regenerate_script"
    max_regeneration_attempts: 3

baseline_strategy:
  first_run: "establish_baseline"

stop_criteria:
  - "composite_score >= 0.85 AND factual_accuracy >= 0.9"
  - "consecutive_iterations_without_improvement >= 2"
  - "total_cost_usd >= 1.0"
  - "max_iterations: 3"

notes: |
  Long-running pipeline — критично использовать stage_gates,
  чтобы не запускать дорогие этапы (TTS, video compose) на плохом скрипте.
  Resume semantics обязательна для production-режима.
```

