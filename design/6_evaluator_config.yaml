## Пример 3: Software Development (итеративная задача)

```yaml
evaluator_config_id: software_dev_v1
task_type: "iterative_engineering"
domain: "software"

metrics:
  - name: "tests_pass_rate"
    description: "Доля проходящих тестов"
    evaluator: "automated_from_logs"
    direction: "max"
    weight: 0.40
    scale: "0..1"
    automated: true
  
  - name: "compilation_success"
    description: "Компилируется ли код без ошибок"
    evaluator: "automated_from_logs"
    direction: "max"
    weight: 0.20
    scale: "0..1"  # 0 или 1, бинарная метрика
    automated: true
  
  - name: "code_quality"
    description: "Качество кода (читаемость, модульность, идиоматичность)"
    evaluator: "llm_judge"
    judge_model: "openrouter:deepseek-v3"
    judge_prompt_ref: "code_quality_judge_v1"
    direction: "max"
    weight: 0.25
    scale: "0..1"
  
  - name: "specification_coverage"
    description: "Покрытие требований спецификации"
    evaluator: "llm_judge"
    judge_model: "local:gemma-4-26b"
    judge_prompt_ref: "spec_coverage_judge_v1"
    direction: "max"
    weight: 0.15
    scale: "0..1"

composite_score:
  method: "weighted_sum"
  minimum_thresholds:
    compilation_success: 1.0  # не компилируется = навык не принят
    tests_pass_rate: 0.8

penalties:
  - condition: "loop_iterations > 5"
    multiplier: 0.90
    description: "штраф за слишком долгое схождение"
  - condition: "total_tokens > 100000"
    multiplier: 0.85
  - condition: "total_cost_usd > 0.30"
    multiplier: 0.80

baseline_strategy:
  first_run: "establish_baseline"
  comparison: "improvement_over_baseline"

stop_criteria:
  - "tests_pass_rate >= 0.95 AND code_quality >= 0.8"
  - "consecutive_iterations_without_improvement >= 2"
  - "max_loop_iterations_reached: 5"
  - "max_iterations: 3"

notes: |
  Для софта важна композиция: код должен И компилироваться, И проходить тесты.
  Минимальные пороги обязательны — провал любого = навык не годен.
```

