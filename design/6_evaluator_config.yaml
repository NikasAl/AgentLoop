## Универсальные правила

Независимо от task_type, действуют следующие принципы:

1. **Метрики задаются per-task, не глобально.** Hypothesis Generator предлагает метрики, пользователь подтверждает.

2. **Автоматизируемые метрики приоритетнее.** Если есть `automated: true` — он считается без LLM, дешевле и быстрее.

3. **LLM-judge через human:browser — для критичных субъективных метрик.** Не тратит API-бюджет, но требует человеческого времени.

4. **Minimum thresholds обязательны.** Если метрика ниже порога — навык не принимается в production, даже если composite_score высокий.

5. **Penalties — soft, thresholds — hard.** Penalty снижает score, threshold блокирует принятие.

6. **Stop criteria предотвращают бесконечные циклы.** Минимум: max_iterations + consecutive_without_improvement + budget_limit.

7. **Baseline фиксируется после первого прогона.** До этого — нет "улучшения", только absolute score.

8. **Composite score метод:**
   - `weighted_sum` — для большинства задач
   - `pareto` — для multi-objective (когда метрики конфликтуют, напр. speed vs accuracy)
