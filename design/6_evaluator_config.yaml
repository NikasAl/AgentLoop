## Пример 2: Стихи (subjective quality)

```yaml
evaluator_config_id: poetry_generation_v1
task_type: "creative_writing"
domain: "literature"

metrics:
  - name: "rhythm_consistency"
    description: "Консистентность ритма (ямб/хорей/анапест выдержан)"
    evaluator: "python:metre_analyzer_v1"
    direction: "max"
    weight: 0.25
    scale: "0..1"
    automated: true
    dependencies: ["python:stdversh"]
    notes: "детерминированный анализ метра через stdversh-библиотеку"
  
  - name: "rhyme_quality"
    description: "Качество рифм (точность, богатство)"
    evaluator: "python:rhyme_analyzer_v1"
    direction: "max"
    weight: 0.20
    scale: "0..1"
    automated: true
  
  - name: "emotional_impact"
    description: "Эмоциональный отклик, вызывает ли стих чувство"
    evaluator: "llm_judge"
    judge_model: "human:browser"
    judge_prompt_ref: "emotional_impact_judge_v1"
    direction: "max"
    weight: 0.30
    scale: "0..1"
    notes: "человек через subl оценивает, можно использовать браузерную модель как помощника"
  
  - name: "originality"
    description: "Оригинальность, не шаблонность"
    evaluator: "llm_judge"
    judge_model: "openrouter:gemini-3.1-flash"
    judge_prompt_ref: "originality_judge_v1"
    direction: "max"
    weight: 0.15
    scale: "0..1"
    notes: "дешёвая API-модель для первоначальной оценки"
  
  - name: "theme_adherence"
    description: "Соответствие заданной теме"
    evaluator: "llm_judge"
    judge_model: "local:gemma-4-26b"
    judge_prompt_ref: "theme_adherence_judge_v1"
    direction: "max"
    weight: 0.10
    scale: "0..1"

composite_score:
  method: "weighted_sum"
  weights_source: "metrics[].weight"
  minimum_thresholds:
    rhythm_consistency: 0.6  # ниже этого — стих не засчитывается
    rhyme_quality: 0.5

penalties:
  - condition: "emotional_impact < 0.4"
    multiplier: 0.5
    description: "сильный штраф за отсутствие эмоционального отклика"
  - condition: "total_cost_usd > 0.20"
    multiplier: 0.85
  - condition: "human_time_sec > 600"
    multiplier: 0.90

baseline_strategy:
  first_run: "establish_baseline"
  comparison: "improvement_over_baseline"
  improvement_target: null  # субъективная задача, цифры задаются после первых попыток

stop_criteria:
  - "composite_score >= 0.85"  # ниже чем у extraction — субъективная задача
  - "consecutive_iterations_without_improvement >= 2"
  - "human_time_total_sec >= 1800"  # 30 минут человеческого времени — предел
  - "max_iterations: 3"  # меньше, чем у extraction, из-за человеческого фактора

notes: |
  Для стихов composite_score менее надёжный, чем для extraction.
  Решение о принятии навыка в production принимает человек на основе
  inspection of outputs, не только score.
```

