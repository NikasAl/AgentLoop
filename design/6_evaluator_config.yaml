# Evaluator Configuration

Вынесенные из `execution_log.json` настройки оценки качества.
Задаются **per-task**, не глобально. Разные задачи — разные метрики и веса.

## Использование

- В research-режиме: Evaluator читает этот конфиг и считает метрики после каждого прогона
- В production-режиме: используется упрощённая версия (только critical metrics)
- Конфиг версионный: при изменении весов создаётся новая версия, старая сохраняется

---

## Пример 1: Math Extraction (Сканави)

```yaml
evaluator_config_id: scanavi_extraction_v1
task_type: "extraction"
domain: "math_education"

metrics:
  - name: "extraction_coverage"
    description: "Все ли задачи на странице извлечены"
    evaluator: "human_visual_check"
    direction: "max"
    weight: 0.4
    scale: "0..1"
    ground_truth_required: false
    notes: "человек проверяет, что все номера задач учтены"
  
  - name: "latex_validity_rate"
    description: "Доля валидного LaTeX (компилируется pdflatex)"
    evaluator: "python:pdflatex_compile_check"
    direction: "max"
    weight: 0.3
    scale: "0..1"
    automated: true
    notes: "детерминированно, без LLM"
  
  - name: "first_pass_accuracy"
    description: "Доля задач, извлечённых правильно с первого раза (без fix_invalid)"
    evaluator: "automated_from_logs"
    direction: "max"
    weight: 0.3
    scale: "0..1"
    automated: true

composite_score:
  method: "weighted_sum"
  weights_source: "metrics[].weight"
  
penalties:
  - condition: "latency_per_page > 300"
    multiplier: 0.95
    description: "штраф за медленность"
  - condition: "total_cost_usd > 0.10"
    multiplier: 0.90
    description: "штраф за превышение бюджета"
  - condition: "human_time_per_page > 60"
    multiplier: 0.92
    description: "штраф за человеческое время"

baseline_strategy:
  first_run: "establish_baseline"
  comparison: "improvement_over_baseline"
  improvement_target: null  # изначально null, после 1 итерации можно задать 0.05

stop_criteria:
  - "composite_score >= 0.95"
  - "consecutive_iterations_without_improvement >= 3"
  - "total_cost_usd >= research_budget_usd"
  - "max_iterations: 5"
```

